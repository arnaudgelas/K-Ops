- id: gq-contra-01
  category: contradiction-sensitive
  question: Does Torque provide true exactly-once processing semantics?
  expected_answer_elements:
  - release notes claim exactly-once
  - community disputes
  - at-least-once
  - deduplication
  - unresolved
  forbidden_conclusions:
  - Torque definitively provides exactly-once
  - no disagreement exists
  relevant_claim_refs:
  - concept: Torque Processing Semantics
    claim: This is an unresolved CONTRADICTION between a primary vendor claim and community commentary
  relevant_source_spans:
  - src: src-fac0000001
    quote: v2.0.0 introduces exactly-once processing semantics for windowed aggregations.
  - src: src-5ec0000014
    quote: Argues that Torque's so-called exactly-once is actually at-least-once
  expected_contradictions:
  - vendor exactly-once claim vs community at-least-once-plus-dedup dispute
  required_uncertainty: true
  expected_behavior: qualify
  consequence_tier: decision

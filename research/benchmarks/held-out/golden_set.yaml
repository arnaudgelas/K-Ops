version: '1.0'
description: Rich golden evaluation set for the held-out Torque benchmark corpus (M1 task E1.2). Every question is answerable or refutable from research/benchmarks/held-out/corpus. Source spans are verbatim substrings of the referenced corpus source note.
corpus: research/benchmarks/held-out/corpus
categories:
- direct-factual
- multi-source-synthesis
- contradiction-sensitive
- freshness-sensitive
- source-retraction-sensitive
- insufficient-evidence
- decision-grade
- adversarial-citation
consequence_tiers:
- exploratory
- recommendation
- decision
- autonomous

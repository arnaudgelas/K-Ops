description = "Lint and heal the vault"
prompt = """
You are the structural repair agent for this knowledge base. You fix structure ‚Äî you do not rewrite knowledge.

---

## What NOT to do

Read this section before touching any file.

- Do not rewrite Key Claims bullets or change their meaning.
- Do not change `claim_quality` assessments ‚Äî that is the compiler's job.
- Do not add or remove source summaries.
- Do not create new concept pages.
- Do not invent content to fill sparse pages ‚Äî add empty scaffolding sections only.
- Do not touch `data/raw/` ‚Äî those files are immutable.
- Do not run more than one pass over each directory.

## Repair order

1. Fix broken wikilinks.
2. Add missing required sections as empty scaffolds.
3. Add missing frontmatter fields with safe defaults.
4. Record revalidation-required pages in `notes/TODO.md`.
5. On source notes, add `evidence_strength` and `source_id` before anything else.

If you are uncertain whether a fix is safe, record it in `notes/TODO.md` instead of making it.

---

## One-pass repair protocol

Make exactly one pass over `notes/Concepts/` and one pass over `notes/Sources/`. Then stop.

### Pass 1 ‚Äî Concept pages (`notes/Concepts/`)

For each concept page, check and fix in this order:

1. **Broken wikilinks** ‚Äî `[[Target]]` where `Target` does not exist as a vault file.
   ‚Üí Fix the path if you can determine the correct target (e.g. spaces/hyphens ‚Üí underscores, add `Concepts/` prefix).
   ‚Üí If the target cannot be resolved: convert `[[Target]]` to plain text `Target` and add `_Concept not yet created: Target_` to the `## Open Questions` section. Never silently delete concept vocabulary.

2. **Missing required sections** ‚Äî a concept page must have: `## What It Is`, `## Key Claims`, `## Evidence / Source Basis`.
   ‚Üí If a section is missing, add an empty scaffold with a `<!-- TODO: populate -->` comment. Do not populate content.

3. **Conflicting quality without Open Questions** ‚Äî `claim_quality: conflicting` but no `## Open Questions` section.
   ‚Üí Add `## Open Questions` with a `<!-- TODO: document the contradiction between sources -->` comment.

4. **Missing required frontmatter fields** ‚Äî `title`, `type`, `claim_quality`, `tags`.
   ‚Üí Add missing fields with safe defaults: `claim_quality: provisional`, `type: concept`. Never use `claim_quality: unknown` ‚Äî it is not a valid value.

5. **Revalidation flag** ‚Äî `revalidation_required: true` in frontmatter.
   ‚Üí Do not remove this flag. Record the page path in `notes/TODO.md` under a "Revalidation Required" heading so a human can review it.

### Pass 2 ‚Äî Source summaries (`notes/Sources/`)

For each source summary, check and fix:

1. **Missing `evidence_strength`** ‚Üí set to `stub`.
2. **Missing `source_id`** ‚Üí derive from the filename stem if it starts with `src-`.
3. **Missing `## Summary` section** ‚Üí add empty scaffold with `<!-- TODO: summarize -->`.
4. **Broken backlinks to concept pages** ‚Üí fix or remove.

### Pass 3 ‚Äî Home and navigation

After both directory passes:
- Verify `notes/Home.md` links to all concept pages that exist. Add missing links under the appropriate section.
- Do not reorganize or rewrite `notes/Home.md` ‚Äî append missing links only.

---

## Done checklist

Stop after completing all three passes. Do not loop back.

- [ ] Concept pages: broken links fixed or removed.
- [ ] Concept pages: missing required sections have empty scaffolds.
- [ ] Concept pages: all `conflicting` pages have `## Open Questions`.
- [ ] Source summaries: all have `evidence_strength` and `source_id`.
- [ ] `notes/Home.md`: references all existing concept pages.
- [ ] `notes/TODO.md`: pages needing human review are recorded.

Print a short heal report: N pages touched, N links fixed, N scaffolds added, N items added to TODO.
"""

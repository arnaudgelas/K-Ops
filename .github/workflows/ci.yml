name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest

      - name: Check Python style
        run: uv run ruff check kops tests

      - name: Check Python formatting
        run: uv run ruff format --check kops tests

      - name: Check agent asset drift
        run: uv run python -m kops.install_agent_assets --dry-run

      - name: Check no unsubstituted placeholders in installed commands
        run: |
          if grep -r '{question}\|{answer_path}\|{web_fetch_policy}\|{plan_summary}\|{format}\|{prompt}' .codex/commands/ .gemini/commands/ 2>/dev/null; then
            echo "ERROR: unsubstituted Python format-string placeholders found in installed commands"
            exit 1
          fi

      - name: Public-safety tripwire (no private corpus)
        run: uv run python -m kops.check_public_safe

      - name: Validate config (strict)
        run: uv run python -m kops.kb validate --strict

      - name: Lint vault (strict)
        run: uv run python -m kops.lint_vault --strict

      - name: Check broken wikilinks
        run: |
          python3 -c "
          import re, sys
          from pathlib import Path
          WIKILINK = re.compile(r'\[\[([^\]|#]+)')
          broken = []
          for p in Path('notes').rglob('*.md'):
              txt = p.read_text()
              for m in WIKILINK.finditer(txt):
                  target = m.group(1).strip()
                  if '/' not in target or target == 'Sources/<source_id>':
                      continue
                  cand = Path('notes') / (target + '.md')
                  if not cand.exists():
                      broken.append(f'{p}: [[{target}]]')
          if broken:
              print('Broken wikilinks:')
              for b in broken[:20]:
                  print(' ', b)
              sys.exit(1)
          print(f'Wikilink check: 0 broken')
          "
